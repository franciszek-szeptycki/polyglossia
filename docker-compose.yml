services:
  server:
    build:
      context: .
    ports:
      - 127.0.0.1:8000:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    command: ["./docker-cmd-server.sh"]
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
