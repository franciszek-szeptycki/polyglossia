<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>{% block title %}System Rewizji{% endblock %}</title>
    <style>
      .text-box, .form-control-custom {
        min-height: 60px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .translated-field {
        border-color: #0d6efd;
        background-color: rgba(13, 110, 253, 0.02);
        font-weight: 500;
        color: #0d6efd;
      }
      .form-control-custom {
        display: block;
        width: 100%;
        padding: 0.8rem 1rem;
        color: #212529;
        background-color: #fff;
        border: 1px solid #dee2e6;
        border-radius: 0.5rem;
        min-height: 120px;
        white-space: pre-wrap;
      }
      .translated-field {
        border-color: #0d6efd;
        background-color: rgba(13, 110, 253, 0.02);
        font-weight: 500;
        color: #0d6efd;
      }
      .errorlist {
        list-style: none;
        padding: 0;
        color: #dc3545;
        font-size: 0.875rem;
        font-weight: bold;
        margin-top: 5px;
      }
      {% block extra_css %}{% endblock %}
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-5">

      {% include 'navbar.html' %}

      <hr/>

      <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white py-3">
          <h4 class="mb-0">{% block header_text %}{% endblock %}</h4>
        </div>
      </div>

      {% block content %}{% endblock %}

    </div>
    {% block extra_js %}{% endblock %}
  </body>
</html>
