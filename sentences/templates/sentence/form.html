{% extends 'base.html' %}

{% block header_text %}Dodaj nowe zdanie{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}

      <div class="mb-4">
        <label class="badge bg-secondary mb-2 text-uppercase"
          >Zdanie</label
        >
        <textarea
          name="original_text"
          id="id_original_text"
          class="form-control-custom shadow-sm"
        >
{% if form.original_text.value %}{{ form.original_text.value }}{% endif %}</textarea
        >
        {{ form.original_text.errors }}
      </div>

      <div class="mb-4">
        <label class="badge bg-primary mb-2 text-uppercase"
          >Tłumaczenie</label
        >
        <textarea
          name="translated_text"
          id="id_translated_text"
          class="form-control-custom translated-field shadow-sm"
        >
{% if form.translated_text.value %}{{ form.translated_text.value }}{% endif %}</textarea
        >
        {{ form.translated_text.errors }}
      </div>

      <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
        <button
          type="submit"
          class="btn btn-primary btn-lg px-5 shadow-sm fw-bold"
        >
          Zapisz
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
