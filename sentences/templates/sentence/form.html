{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block header_text %}
  Dodaj nowe zdanie
{% endblock %}

{% block card_body %}
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm fw-bold">
        Zapisz
      </button>
    </div>
  </form>
{% endblock %}
