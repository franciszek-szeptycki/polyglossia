<div class="card shadow-sm border mb-2 w-100" id="flashcard-{{ card.id }}">
  <form hx-post="{% url 'flashcard_update_htmx' card.id %}"
        hx-target="#flashcard-{{ card.id }}"
        hx-swap="outerHTML"
        hx-trigger="change from:input"
        class="card-body p-0">
    {% csrf_token %}

    <div class="d-flex align-items-stretch">

      <div class="p-3 border-end" style="flex: 1 0 60%;">
        <label class="small text-muted fw-bold text-uppercase d-block mb-1" style="font-size: 0.6rem;">Front</label>
        <textarea name="front"
                  class="form-control border-0 bg-transparent p-0 fw-bold w-100"
                  rows="1"
                  style="resize: none; overflow: hidden; min-height: 1.5em;"
                  oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                  hx-post="{% url 'flashcard_update_htmx' card.id %}"
                  hx-trigger="blur, keyup[key=='Enter']">{{ card.front }}</textarea>
      </div>

      <div class="p-3 border-end" style="flex: 0 0 30%; min-width: 200px;">
        <label class="small text-muted fw-bold text-uppercase d-block mb-1" style="font-size: 0.6rem;">Back</label>
        <textarea name="back"
                  class="form-control border-0 bg-transparent p-0 text-muted w-100"
                  rows="1"
                  style="resize: none; overflow: hidden; min-height: 1.5em;"
                  oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                  hx-post="{% url 'flashcard_update_htmx' card.id %}"
                  hx-trigger="blur, keyup[key=='Enter']">{{ card.back }}</textarea>
      </div>

      <div class="d-flex align-items-center justify-content-center {% if card.is_active %}bg-success bg-opacity-10{% else %}bg-light{% endif %}"
           style="width: 70px; min-width: 70px; transition: 0.3s;">
        <div class="form-check form-switch m-0">
          <input class="form-check-input" type="checkbox" name="is_active"
                 id="check-{{ card.id }}" style="transform: scale(1.3); cursor: pointer;"
                 {% if card.is_active %}checked{% endif %}>
        </div>
      </div>

    </div>
  </form>
</div>
