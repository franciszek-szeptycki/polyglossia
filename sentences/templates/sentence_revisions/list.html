<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Lista Rewizji</title>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm">
        <div
          class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
        >
          <h4 class="mb-0">Historia Rewizji</h4>
          <span class="badge bg-light text-dark"
            >Razem: {{ revisions.count }}</span
          >
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Data</th>
                  <th>Oryginalny tekst</th>
                  <th>Tłumaczenie</th>
                  <th class="text-end">Akcje</th>
                </tr>
              </thead>
              <tbody>
                {% for item in revisions %}
                <tr>
                  <td class="text-muted small">
                    {{ item.created_at|date:"Y-m-d H:i" }}
                  </td>
                  <td>{{ item.original_text|truncatechars:50 }}</td>
                  <td>
                    <span class="text-success"
                      >{{ item.translated_text|truncatechars:50 }}</span
                    >
                  </td>
                  <td class="text-end">
                    <a
                      href="{% url 'sentence_revision_detail' item.id %}"
                      class="btn btn-sm btn-outline-primary"
                      >Szczegóły →</a
                    >
                  </td>
                </tr>
                {% empty %}
                <tr>
                  <td colspan="4" class="text-center py-4">
                    Brak rewizji w bazie.
                  </td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
